# ── JWT ───────────────────────────────────────────────────────────────────────
# 64-byte Base64-encoded secret (safe for HS256/HS384/HS512 in JJWT 0.12+)
app.jwt.secret=dGVzdC1zZWNyZXQta2V5LWZvci10ZXN0aW5nLXB1cnBvc2VzLW9ubHkta2V5LW9ubHk=
app.jwt.expiration-ms=3600000

# ── DataSource (local Docker Postgres — auth-db container on port 5431) ──────
spring.datasource.url=jdbc:h2:mem:auth_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# ── RabbitMQ (disable auto-config for integration tests) ─────────────────────
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration
