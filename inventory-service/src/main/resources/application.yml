# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  INVENTORY-SERVICE — Multi-Environment Configuration                       ║
# ║                                                                            ║
# ║  default  → local IDE run       (localhost, mapped host ports)             ║
# ║  dev      → Docker Compose run  (container hostnames, internal ports)      ║
# ║  prod     → Railway deployment  (env vars injected by platform)            ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

spring:
  application:
    name: inventory-service

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

server:
  port: 8083

# ── External API Keys ────────────────────────────────────────────────────────
usda:
  api:
    key: ${USDA_API_KEY:C8FAMk95THxyZi9f0XOn4ZqEG4G0cXOgusxh2gti}
    url: ${USDA_API_URL:https://api.nal.usda.gov/fdc/v1}

GOOGLE_API_KEY: ${GOOGLE_API_KEY:}
DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:sk-0e23be7d6f104c5ca0096da618b33cca}
OPENROUTER_API_KEY: ${OPENROUTER_API_KEY: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}

# ── RabbitMQ Queue Config (shared across profiles) ───────────────────────────
app:
  rabbitmq:
    exchange: restaurant.events.exchange
    queues:
      menu-nutrition:
        name: menu.nutrition.processed.queue
        routing-key: menu.nutrition.processed
        dlq-name: menu.nutrition.processed.queue.dlq
        dlq-routing-key: menu.nutrition.processed.dlq

# ─────────────────────────────────────────────────────────────────────────────
#  DEFAULT profile — local IDE run
# ─────────────────────────────────────────────────────────────────────────────
---
spring:
  config:
    activate:
      on-profile: default

  datasource:
    url: jdbc:postgresql://localhost:5433/inventory_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

# ─────────────────────────────────────────────────────────────────────────────
#  DEV profile — Docker Compose run
# ─────────────────────────────────────────────────────────────────────────────
---
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:postgresql://inventory-db:5432/inventory_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  rabbitmq:
    host: rabbitmq
    port: 5672
    username: guest
    password: guest

server:
  port: 8080

# ─────────────────────────────────────────────────────────────────────────────
#  PROD profile — Railway deployment
# ─────────────────────────────────────────────────────────────────────────────
---
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: jdbc:postgresql://ep-divine-mode-alfmrpgy-pooler.c-3.eu-central-1.aws.neon.tech/inventory_db?sslmode=require&channel_binding=require
    username: neondb_owner
    password: npg_tHN2wIgpPo6E
    driver-class-name: org.postgresql.Driver

  rabbitmq:
    host: ${RABBITMQ_HOST}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME}
    password: ${RABBITMQ_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

server:
  port: ${PORT:8080}
