# Local configuration to prevent rebuilding bulky docker containers constantly
spring:
  datasource:
    url: jdbc:postgresql://localhost:5436/kitchen_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

server:
  port: 8086

# rabbitmq properties
app:
  rabbitmq:
    exchange: restaurant.events.exchange
    queues:
      user-created:
        name: user.created.queue
        routing-key: user.created

        dlq-name: user.created.queue.dlq
        dlq-routing-key: user.created.dlq

