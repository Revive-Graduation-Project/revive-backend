spring:
  application:
    name: kitchen-service

  datasource:
    url: jdbc:postgresql://kitchen-db:5432/kitchen_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  rabbitmq:
    host: rabbitmq
    port: 5672
    username: guest
    password: guest

server:
  port: 8080

app:
  rabbitmq:
    exchange: restaurant.events.exchange
    queues:
      user-created:
        name: user.created.queue
        routing-key: user.created

        dlq-name: user.created.queue.dlq
        dlq-routing-key: user.created.dlq

