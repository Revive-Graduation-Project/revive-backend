spring:
  application:
    name: menu-management-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:menu-db}:${DB_PORT:5432}/menu_db
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    listener:
      simple:
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 2000ms
          multiplier: 2.0
          max-interval: 10000ms
        default-requeue-rejected: false

server:
  port: 8080

app:
  rabbitmq:
    exchange: restaurant.events.exchange
    queues:
      menu-nutrition:
        name: menu.nutrition.processed.queue
        routing-key: menu.nutrition.processed
        dlq-name: menu.nutrition.processed.queue.dlq
        dlq-routing-key: menu.nutrition.processed.dlq
