networks:
  restaurant-net:
    driver: bridge

services:
  # ─────────────────────────────────────────────
  # PostgreSQL Databases
  # ─────────────────────────────────────────────
  auth-db:
    image: postgres:16
    platform: linux/amd64
    container_name: auth-db
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5431:5432"
    volumes:
      - auth-db-data:/var/lib/postgresql/data
    networks:
      - restaurant-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  client-db:
    image: postgres:16
    platform: linux/amd64
    container_name: client-db
    environment:
      POSTGRES_DB: client_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - client-db-data:/var/lib/postgresql/data
    networks:
      - restaurant-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  inventory-db:
    image: postgres:16
    platform: linux/amd64
    container_name: inventory-db
    environment:
      POSTGRES_DB: inventory_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - inventory-db-data:/var/lib/postgresql/data
    networks:
      - restaurant-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  menu-db:
    image: postgres:16
    platform: linux/amd64
    container_name: menu-db
    environment:
      POSTGRES_DB: menu_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - menu-db-data:/var/lib/postgresql/data
    networks:
      - restaurant-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  order-db:
    image: postgres:16
    platform: linux/amd64
    container_name: order-db
    environment:
      POSTGRES_DB: order_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"
    volumes:
      - order-db-data:/var/lib/postgresql/data
    networks:
      - restaurant-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  kitchen-db:
    image: postgres:16
    platform: linux/amd64
    container_name: kitchen-db
    environment:
      POSTGRES_DB: kitchen_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5436:5432"
    volumes:
      - kitchen-db-data:/var/lib/postgresql/data
    networks:
      - restaurant-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # Spring Boot Microservices
  # ─────────────────────────────────────────────
  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    container_name: auth-service
    ports:
      - "8081:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://auth-db:5432/auth_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    depends_on:
      auth-db:
        condition: service_healthy
    networks:
      - restaurant-net

  client-service:
    build:
      context: .
      dockerfile: client-service/Dockerfile
    container_name: client-service
    ports:
      - "8082:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://client-db:5432/client_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    depends_on:
      client-db:
        condition: service_healthy
    networks:
      - restaurant-net

  inventory-service:
    build:
      context: .
      dockerfile: inventory-service/Dockerfile
    container_name: inventory-service
    ports:
      - "8083:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://inventory-db:5432/inventory_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    depends_on:
      inventory-db:
        condition: service_healthy
    networks:
      - restaurant-net

  menu-management-service:
    build:
      context: .
      dockerfile: menu-management-service/Dockerfile
    container_name: menu-management-service
    ports:
      - "8084:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://menu-db:5432/menu_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    depends_on:
      menu-db:
        condition: service_healthy
    networks:
      - restaurant-net

  order-service:
    build:
      context: .
      dockerfile: order-service/Dockerfile
    container_name: order-service
    ports:
      - "8085:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://order-db:5432/order_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    depends_on:
      order-db:
        condition: service_healthy
    networks:
      - restaurant-net

  kitchen-service:
    build:
      context: .
      dockerfile: kitchen-service/Dockerfile
    container_name: kitchen-service
    ports:
      - "8086:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://kitchen-db:5432/kitchen_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    depends_on:
      kitchen-db:
        condition: service_healthy
    networks:
      - restaurant-net


  rabbitmq:
    image: rabbitmq:4.2.4-management-alpine
    container_name: rabbitmq
    platform: linux/amd64
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - restaurant-net

  # ─────────────────────────────────────────────
  # Next.js Frontend / AI Proxy  (disabled — uncomment when ready)
  # ─────────────────────────────────────────────
  # ai-proxy-frontend:
  #   build:
  #     context: ./ai-proxy-frontend
  #     dockerfile: Dockerfile
  #   container_name: ai-proxy-frontend
  #   ports:
  #     - "3000:3000"
  #   environment:
  #     NODE_ENV: production
  #   dns:
  #     - 8.8.8.8
  #     - 1.1.1.1
  #   networks:
  #     - restaurant-net

volumes:
  auth-db-data:
  client-db-data:
  inventory-db-data:
  menu-db-data:
  order-db-data:
  kitchen-db-data:
  rabbitmq_data:
