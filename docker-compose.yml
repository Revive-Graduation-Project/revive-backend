networks:
  restaurant-net:
    driver: bridge

services:
  # ─────────────────────────────────────────────
  # PostgreSQL Databases
  # ─────────────────────────────────────────────
  auth-db:
    image: postgres:16
    platform: linux/amd64
    container_name: auth-db
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5431:5432"
    volumes:
      - auth-db-data:/var/lib/postgresql/data
    networks:
      - restaurant-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  client-db:
    image: postgres:16
    platform: linux/amd64
    container_name: client-db
    environment:
      POSTGRES_DB: client_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - client-db-data:/var/lib/postgresql/data
    networks:
      - restaurant-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  inventory-db:
    image: postgres:16
    platform: linux/amd64
    container_name: inventory-db
    environment:
      POSTGRES_DB: inventory_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - inventory-db-data:/var/lib/postgresql/data
    networks:
      - restaurant-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  menu-db:
    image: postgres:16
    platform: linux/amd64
    container_name: menu-db
    environment:
      POSTGRES_DB: menu_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - menu-db-data:/var/lib/postgresql/data
    networks:
      - restaurant-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  order-db:
    image: postgres:16
    platform: linux/amd64
    container_name: order-db
    environment:
      POSTGRES_DB: order_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"
    volumes:
      - order-db-data:/var/lib/postgresql/data
    networks:
      - restaurant-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  kitchen-db:
    image: postgres:16
    platform: linux/amd64
    container_name: kitchen-db
    environment:
      POSTGRES_DB: kitchen_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5436:5432"
    volumes:
      - kitchen-db-data:/var/lib/postgresql/data
    networks:
      - restaurant-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # Message Broker
  # ─────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: rabbitmq
    ports:
      - "5672:5672" # AMQP
      - "15672:15672" # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    networks:
      - restaurant-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # API Gateway (ONLY exposed port to the outside)
  # ─────────────────────────────────────────────
  gateway-service:
    build:
      context: ./gateway-service
    container_name: gateway-service
    ports:
      - "8080:8080" # the ONLY port exposed to the host
    environment:
      JWT_SECRET: ${JWT_SECRET:-404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
    depends_on:
      - auth-service
      - client-service
      - inventory-service
      - menu-management-service
      - order-service
      - kitchen-service
    networks:
      - restaurant-net

  # ─────────────────────────────────────────────
  # Spring Boot Microservices (internal only)
  # All services use SPRING_PROFILES_ACTIVE=dev (set in Dockerfile)
  # which configures container hostnames for DB and RabbitMQ.
  # ─────────────────────────────────────────────
  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    container_name: auth-service
    # no ports: — only reachable via gateway on Docker network
    environment:
      AUTH_DB_URL: jdbc:postgresql://auth-db:5432/auth_db
      AUTH_DB_USERNAME: postgres
      AUTH_DB_PASSWORD: postgres
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      JWT_SECRET: ${JWT_SECRET:-404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
    depends_on:
      auth-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - restaurant-net

  client-service:
    build:
      context: .
      dockerfile: client-service/Dockerfile
    container_name: client-service
    # no ports: — only reachable via gateway on Docker network
    environment:
      CLIENT_DB_URL: jdbc:postgresql://client-db:5432/client_db
      CLIENT_DB_USERNAME: postgres
      CLIENT_DB_PASSWORD: postgres
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
    depends_on:
      client-db:
        condition: service_healthy
    networks:
      - restaurant-net

  inventory-service:
    build:
      context: .
      dockerfile: inventory-service/Dockerfile
    container_name: inventory-service
    # no ports: — only reachable via gateway on Docker network
    env_file:
      - inventory-service/.env
    environment:
      INVENTORY_DB_URL: jdbc:postgresql://inventory-db:5432/inventory_db
      INVENTORY_DB_USERNAME: postgres
      INVENTORY_DB_PASSWORD: postgres
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      USDA_API_KEY: ${USDA_API_KEY}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
    depends_on:
      inventory-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - restaurant-net

  menu-management-service:
    build:
      context: .
      dockerfile: menu-management-service/Dockerfile
    container_name: menu-management-service
    # no ports: — only reachable via gateway on Docker network
    environment:
      MENU_DB_URL: jdbc:postgresql://menu-db:5432/menu_db
      MENU_DB_USERNAME: postgres
      MENU_DB_PASSWORD: postgres
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
    depends_on:
      menu-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - restaurant-net

  order-service:
    build:
      context: .
      dockerfile: order-service/Dockerfile
    container_name: order-service
    # no ports: — only reachable via gateway on Docker network
    environment:
      ORDER_DB_URL: jdbc:postgresql://order-db:5432/order_db
      ORDER_DB_USERNAME: postgres
      ORDER_DB_PASSWORD: postgres
    depends_on:
      order-db:
        condition: service_healthy
    networks:
      - restaurant-net

  kitchen-service:
    build:
      context: .
      dockerfile: kitchen-service/Dockerfile
    container_name: kitchen-service
    # no ports: — only reachable via gateway on Docker network
    environment:
      KITCHEN_DB_URL: jdbc:postgresql://kitchen-db:5432/kitchen_db
      KITCHEN_DB_USERNAME: postgres
      KITCHEN_DB_PASSWORD: postgres
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      JWT_SECRET: ${JWT_SECRET:-404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
    depends_on:
      kitchen-db:
        condition: service_healthy
    networks:
      - restaurant-net

  # ─────────────────────────────────────────────
  # Next.js Frontend / AI Proxy  (disabled — uncomment when ready)
  # ─────────────────────────────────────────────
  # ai-proxy-frontend:
  #   build:
  #     context: ./ai-proxy-frontend
  #     dockerfile: Dockerfile
  #   container_name: ai-proxy-frontend
  #   ports:
  #     - "3000:3000"
  #   environment:
  #     NODE_ENV: production
  #   dns:
  #     - 8.8.8.8
  #     - 1.1.1.1
  #   networks:
  #     - restaurant-net

volumes:
  auth-db-data:
  client-db-data:
  inventory-db-data:
  menu-db-data:
  order-db-data:
  kitchen-db-data:
  rabbitmq_data:
