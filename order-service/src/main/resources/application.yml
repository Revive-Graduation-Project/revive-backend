# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  ORDER-SERVICE — Multi-Environment Configuration                           ║
# ║                                                                            ║
# ║  default  → local IDE run       (localhost, mapped host ports)             ║
# ║  dev      → Docker Compose run  (container hostnames, internal ports)      ║
# ║  prod     → Railway deployment  (env vars injected by platform)            ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

spring:
  application:
    name: order-service

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

server:
  port: 8085

springdoc:
  api-docs:
    path: /api/orders/v3/api-docs


# ─────────────────────────────────────────────────────────────────────────────
#  DEFAULT profile — local IDE run
# ─────────────────────────────────────────────────────────────────────────────
---
spring:
  config:
    activate:
      on-profile: default

  datasource:
    url: jdbc:postgresql://localhost:5435/order_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver


# ─────────────────────────────────────────────────────────────────────────────
#  DEV profile — Docker Compose run
# ─────────────────────────────────────────────────────────────────────────────
---
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:postgresql://order-db:5432/order_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

server:
  port: 8080


# ─────────────────────────────────────────────────────────────────────────────
#  PROD profile — Railway deployment
# ─────────────────────────────────────────────────────────────────────────────
---
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${ORDER_DB_URL:${PROD_DB_URL}}
    username: ${ORDER_DB_USERNAME:${PROD_DB_USERNAME}}
    password: ${ORDER_DB_PASSWORD:${PROD_DB_PASSWORD}}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        exclude: "*"
